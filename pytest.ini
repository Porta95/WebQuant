[pytest]
# ── pytest.ini ────────────────────────────────────────────────────────────────
# Configuración para correr los tests de WebQuant

testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Mostrar los 10 tests más lentos
addopts =
    -v
    --tb=short
    --durations=10
    -p no:warnings

# Markers personalizados
markers =
    slow: tests que llaman a yfinance real (skippear con -m "not slow")
    unit: tests puramente unitarios sin I/O
    integration: tests de integración con mocks
