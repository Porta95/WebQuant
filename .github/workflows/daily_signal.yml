name: Daily Signal Generator

on:
  schedule:
    - cron: "0 12 * * 1-5"   # Lunes a viernes a las 12:00 UTC
  workflow_dispatch:           # Permite correrlo manualmente

jobs:
  generate-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          # FIX: fetch completo para evitar problemas con el push posterior
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Generate signal and save JSON
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/generate_signal.py

      - name: Commit signal data
        run: |
          set -x
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git reset --soft HEAD
          git fetch origin main
          git reset --mixed origin/main
          git add data/
          git diff --staged --quiet || git commit -m "data: senal diaria $(date +'%Y-%m-%d')"
          git push origin main